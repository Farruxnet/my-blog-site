            <h1>Bog'lanish</h1>
            <p>Savol, taklif yoki hamkorlik uchun quyidagi forma yoki linklardan foydalaning.</p>
            <p><strong>Email:</strong> <a href="mailto:contact@farruxnet.uz">contact@farruxnet.uz</a></p>
            <p><strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/farruxnet/" target="_blank" rel="noopener">linkedin.com/in/farruxnet</a></p>
            <form class="contact-form" action="mailto:contact@farruxnet.uz" method="post" enctype="text/plain">
                <div><label for="name">Ism</label><input id="name" name="name" type="text" autocomplete="name" required></div>
                <div><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="email" required></div>
                <div><label for="message">Xabar</label><textarea id="message" name="message" rows="7" required></textarea></div>
                <button class="primary-button" type="submit">Yuborish</button>
            </form>
        </article>
