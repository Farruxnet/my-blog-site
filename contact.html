<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="farruxnet.uz bilan bog'lanish">
    <title>Contact - farruxnet.uz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: '#3f51b5'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-white text-slate-800 dark:bg-slate-900 dark:text-white transition-colors duration-300">

<header class="border-b border-slate-200 dark:border-slate-700 sticky top-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <div class="h-16 flex items-center justify-between">
            <div class="font-bold text-2xl">
                <a href="index.html" class="hover:text-accent transition">farruxnet.uz</a>
            </div>

            <nav
                id="siteMenu"
                class="hidden md:flex md:items-center md:gap-8 text-sm font-medium
                       absolute md:static top-16 left-0 w-full md:w-auto
                       bg-white dark:bg-slate-900
                       md:bg-transparent
                       border-t md:border-0 border-slate-200 dark:border-slate-700
                       px-4 py-4 md:p-0
                       flex-col md:flex-row gap-4 md:gap-8"
            >
                <a href="index.html" class="hover:text-accent transition">Home</a>
                <a href="about.html" class="hover:text-accent transition">About</a>
                <a href="contact.html" class="text-accent transition" aria-current="page">Contact</a>
            </nav>

            <div class="flex items-center gap-3">
                <input
                    type="text"
                    placeholder="Search blog..."
                    class="hidden lg:block px-4 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 outline-none focus:border-accent"
                />
                <button
                    id="menuToggle"
                    class="md:hidden text-2xl leading-none"
                    type="button"
                    aria-label="Toggle menu"
                    aria-controls="siteMenu"
                    aria-expanded="false"
                >
                    ☰
                </button>
            </div>
        </div>
    </div>
</header>

<main class="page-content max-w-3xl mx-auto px-4 sm:px-6 py-10">
    <article>
        <p class="page-eyebrow">Contact</p>
        <h1>Bog'lanish</h1>
        <p>
            Savol, taklif yoki hamkorlik bo'yicha xabar yuboring. Static hostingda ishlashi uchun forma email client
            orqali xabar tayyorlaydi.
        </p>

        <div class="contact-methods" aria-label="Bog'lanish usullari">
            <a href="mailto:contact@farruxnet.uz">
                <i class="fa-solid fa-envelope" aria-hidden="true"></i>
                <span>
                    <strong>Email</strong>
                    contact@farruxnet.uz
                </span>
            </a>
            <a href="https://www.linkedin.com/in/farruxnet/" target="_blank" rel="noopener">
                <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
                <span>
                    <strong>LinkedIn</strong>
                    linkedin.com/in/farruxnet
                </span>
            </a>
        </div>

        <form class="contact-form" action="mailto:contact@farruxnet.uz" method="post" enctype="text/plain">
            <div>
                <label for="name">Ism</label>
                <input id="name" name="name" type="text" autocomplete="name" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" autocomplete="email" required>
            </div>

            <div>
                <label for="subject">Mavzu</label>
                <input id="subject" name="subject" type="text" required>
            </div>

            <div>
                <label for="message">Xabar</label>
                <textarea id="message" name="message" rows="7" required></textarea>
            </div>

            <button type="submit">
                <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
                Yuborish
            </button>
        </form>
    </article>
</main>

<footer class="border-t border-slate-200 dark:border-slate-700">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4">
        <p class="text-sm text-slate-500">© 2026 Blog Clone</p>

        <div class="social-links flex flex-wrap justify-center items-center gap-3">
            <a href="#" aria-label="Telegram">
                <i class="fa-brands fa-telegram" aria-hidden="true"></i>
            </a>
            <a href="#" aria-label="YouTube">
                <i class="fa-brands fa-youtube" aria-hidden="true"></i>
            </a>
            <a href="https://www.linkedin.com/in/farruxnet/" aria-label="LinkedIn">
                <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
            </a>
        </div>
    </div>
</footer>

<script src="assets/js/site.js"></script>
</body>
</html>
