<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Responsive Blog Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: '#3f51b5'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-white text-slate-800 dark:bg-slate-900 dark:text-white transition-colors duration-300">

<header class="border-b border-slate-200 dark:border-slate-700 sticky top-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">

        <div class="h-16 flex items-center justify-between">

            <!-- Logo -->
            <div class="font-bold text-2xl">
                <a href="index.html" class="hover:text-accent transition">
                    farruxnet.uz
                </a>
            </div>

            <nav
                id="siteMenu"
                class="hidden md:flex md:items-center md:gap-8 text-sm font-medium
                       absolute md:static top-16 left-0 w-full md:w-auto
                       bg-white dark:bg-slate-900
                       md:bg-transparent
                       border-t md:border-0 border-slate-200 dark:border-slate-700
                       px-4 py-4 md:p-0
                       flex-col md:flex-row gap-4 md:gap-8"
            >
                <a href="index.html" class="hover:text-accent transition">Home</a>
                <a href="#" class="hover:text-accent transition">Blog</a>
                <a href="#" class="hover:text-accent transition">Docs</a>
                <a href="#" class="hover:text-accent transition">About</a>
            </nav>

            <div class="flex items-center gap-3">
                <input
                    type="text"
                    placeholder="Search blog..."
                    class="hidden lg:block px-4 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 outline-none focus:border-accent"
                />
                <button id="menuToggle" class="md:hidden text-2xl leading-none" aria-label="Toggle menu">☰</button>
            </div>

        </div>
    </div>
</header>

<!-- Blog List -->
<main class="max-w-3xl mx-auto px-4 sm:px-6 py-10 sm:py-5">
    <div class="space-y-8">
        <article class="border-b border-slate-200 dark:border-slate-700 pb-6">
            <p class="text-sm text-slate-500">28 April 2026</p>
            <a href="post.html" class="block hover:text-accent">
                <h2 class="text-xl sm:text-2xl font-semibold mt-2">Building fast documentation systems</h2>
            </a>
        </article>

        <article class="border-b border-slate-200 dark:border-slate-700 pb-6">
            <p class="text-sm text-slate-500">26 April 2026</p>
            <a href="post.html" class="block hover:text-accent">
                <h2 class="text-xl sm:text-2xl font-semibold mt-2">Dark mode UX patterns</h2>
            </a>
        </article>

        <article class="border-b border-slate-200 dark:border-slate-700 pb-6">
            <p class="text-sm text-slate-500">24 April 2026</p>
            <a href="post.html" class="block hover:text-accent">
                <h2 class="text-xl sm:text-2xl font-semibold mt-2">Server-side rendering first</h2>
            </a>
        </article>
    </div>

    <!-- Pagination -->
    <div class="flex flex-wrap justify-center gap-3 mt-12">
        <button class="px-4 py-2 border rounded-lg">Prev</button>
        <button class="px-4 py-2 border rounded-lg">1</button>
        <button class="px-4 py-2 border rounded-lg">2</button>
        <button class="px-4 py-2 border rounded-lg">Next</button>
    </div>
</main>

<!-- Footer -->
<footer class="border-t border-slate-200 dark:border-slate-700">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4">
        <p class="text-sm text-slate-500">© 2026 Blog Clone</p>

        <div class="flex flex-wrap justify-center items-center gap-4 sm:gap-6 text-sm">
            <a href="#" class="hover:text-accent">Telegram</a>
            <a href="#" class="hover:text-accent">YouTube</a>
            <a href="#" class="hover:text-accent">LinkedIn</a>
        </div>
    </div>
</footer>

<script src="assets/js/site.js"></script>

</body>
</html>
